spring:
  application:
    name: freelanceflow
  datasource:
    url: ${DB_URL:${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/freelanceflow}}
    username: ${DB_USER:${SPRING_DATASOURCE_USERNAME:postgres}}
    password: ${DB_PASSWORD:${SPRING_DATASOURCE_PASSWORD:postgres}}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: ${FLYWAY_BASELINE:true}
    baseline-version: 0
  data:
    web:
      pageable:
        default-page-size: 20
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  cache:
    type: redis
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: freelanceflow-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.freelanceflow.notification.dto"
    listener:
      ack-mode: batch
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${GMAIL_USERNAME:your-email@gmail.com}
    password: ${GMAIL_APP_PASSWORD:your-16-char-app-password}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
  lifecycle:
    timeout-per-shutdown-phase: 30s

jwt:
  secret: ${JWT_SECRET:local-dev-secret-must-be-at-least-32-characters-long}
  expiration-ms: 900000
  refresh-expiration-days: 30

razorpay:
  key-id: ${RAZORPAY_KEY_ID:rzp_test_placeholder}
  key-secret: ${RAZORPAY_KEY_SECRET:placeholder}
  webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:placeholder}

grok:
  api:
    key: ${GROK_API_KEY:your_key}
    base-url: https://api.groq.com/openai/v1
    model: ${GROK_MODEL:llama-3.1-8b-instant}

app:
  kafka:
    enabled: true

server:
  port: 8080
  shutdown: graceful

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
